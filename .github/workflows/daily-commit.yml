name: Daily Auto Commit

permissions:
  contents: write

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Step by 21f1006268@ds.study.iitm.ac.in
        run: |
          echo "Workflow triggered at $(date)" >> daily_log.txt

      - name: Commit and Push
        run: |
          git add daily_log.txt
          git commit -m "Daily automated commit on $(date)" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}
